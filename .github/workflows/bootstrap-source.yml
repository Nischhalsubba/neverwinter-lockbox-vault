name: Bootstrap validated source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-source.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-source
  cancel-in-progress: false

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct validated source archive
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .bootstrap/part-00.b64 \
            .bootstrap/part-01.b64 \
            .bootstrap/part-02.b64 \
            .bootstrap/rem-00.b64 \
            .bootstrap/rem-01.b64 \
            .bootstrap/rem-02.b64 \
            .bootstrap/rem-03.b64 \
            .bootstrap/rem-04.b64 \
            .bootstrap/rem-05.b64 \
            .bootstrap/rem-06.b64 \
            | base64 --decode > /tmp/neverwinter-lockbox-vault.tar.gz
          gzip --test /tmp/neverwinter-lockbox-vault.tar.gz

      - name: Replace bootstrap files with project source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/neverwinter-lockbox-vault.tar.gz -C .

      - name: Publish project to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Nischhal Raj Subba"
          git config user.email "hinischalsubba@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to publish."
            exit 0
          fi
          git commit -m "Publish Neverwinter Lockbox Vault"
          git push origin HEAD:main
