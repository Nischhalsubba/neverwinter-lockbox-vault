name: Build release artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and build
        run: npm run check

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: neverwinter-lockbox-vault-v0.1.0-dist
          path: dist/
          if-no-files-found: error
          compression-level: 9
