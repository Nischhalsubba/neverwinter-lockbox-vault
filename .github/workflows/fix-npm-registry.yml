name: Fix npm registry lockfile

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.registry-fix-trigger'

permissions:
  contents: write

concurrency:
  group: fix-npm-registry
  cancel-in-progress: false

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace internal npm registry URLs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          lock = Path('package-lock.json')
          text = lock.read_text()
          old = 'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/'
          new = 'https://registry.npmjs.org/'
          count = text.count(old)
          if count == 0:
              raise SystemExit('No internal registry URLs found in package-lock.json')
          lock.write_text(text.replace(old, new))
          print(f'Replaced {count} internal registry URLs')
          PY
          cat > .npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          fetch-retries=5
          fetch-retry-factor=2
          fetch-retry-mintimeout=10000
          fetch-retry-maxtimeout=60000
          EOF
          if grep -q 'applied-caas-gateway' package-lock.json; then
            echo 'Internal registry URLs remain in package-lock.json'
            exit 1
          fi

      - name: Install dependencies from public npm
        run: npm clean-install --progress=false

      - name: Run tests and production build
        run: npm run check

      - name: Commit verified fix to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Nischhal Raj Subba'
          git config user.email 'hinischalsubba@gmail.com'
          rm -f .github/workflows/fix-npm-registry.yml
          git add package-lock.json .npmrc .github/workflows/fix-npm-registry.yml
          git commit -m 'Fix npm registry for cloud builds'
          git push origin HEAD:main
