name: Refresh NW Hub media

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: refresh-nwhub-media
  cancel-in-progress: false

jobs:
  extract:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[automation] Refresh NW Hub media'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install browser extractor
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Extract NW Hub pack images
        run: node scripts/extract_nwhub_assets.mjs

      - name: Verify catalogue and production build
        run: npm run check

      - name: Publish refreshed media map to main
        run: |
          git config user.name "Nischhal Raj Subba"
          git config user.email "hinischalsubba@gmail.com"
          git add data/nwhub-assets.json data/nwhub-media.js
          if git diff --cached --quiet; then
            echo "NW Hub media map is already current."
            exit 0
          fi
          git commit -m "Refresh NW Hub media URLs"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Close trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "NW Hub media extraction finished and the generated URL map was committed directly to main."
